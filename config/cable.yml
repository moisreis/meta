# Configures Action Cable adapters and persistence settings for all environments.
#
# This file defines WebSocket backend adapters, database connectivity,
# polling intervals, and message retention policies used by Action Cable.
#
# @author Moisés Reis

# ============================================================================
# DEVELOPMENT ENVIRONMENT
# ============================================================================

development:
  adapter: async

# ============================================================================
# TEST ENVIRONMENT
# ============================================================================

test:
  adapter: test

# ============================================================================
# PRODUCTION ENVIRONMENT
# ============================================================================

production:
  adapter: solid_cable

  connects_to:
    database:
      writing: cable

  polling_interval: 0.1.seconds
  message_retention: 1.day
