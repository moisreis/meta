# Configures recurring Solid Queue scheduled tasks for the production environment.
#
# Defines automated background maintenance operations executed by the
# Solid Queue scheduler. These tasks help manage queue persistence,
# cleanup, and long-running operational housekeeping.
#
# @author Moisés Reis

# ============================================================================
# PRODUCTION SCHEDULED TASKS
# ============================================================================

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
