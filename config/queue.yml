# Configures Solid Queue dispatcher and worker processes for all environments.
#
# This file defines queue polling behavior, worker concurrency, batch
# processing limits, and process/thread allocation used by Solid Queue
# background job execution.
#
# Environment Variables:
# - JOB_CONCURRENCY: [Integer] Number of worker processes to spawn
#                                (default: 1).
#
# @author Moisés Reis

# ============================================================================
# DEFAULT CONFIGURATION
# ============================================================================

default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500

  workers:
    - queues: "*"
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1

# ============================================================================
# DEVELOPMENT ENVIRONMENT
# ============================================================================

development:
  <<: *default

# ============================================================================
# TEST ENVIRONMENT
# ============================================================================

test:
  <<: *default

# ============================================================================
# PRODUCTION ENVIRONMENT
# ============================================================================

production:
  <<: *default
